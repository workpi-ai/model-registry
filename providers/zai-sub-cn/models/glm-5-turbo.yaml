name: glm-5-turbo

apis:
  chat_completion:
    api_format: openai
    endpoint: /chat/completions
    context:
      max_input: 200000
      max_output: 131072
    features:
      image_input: false
      tool_use: true
      reasoning: true
      structured_output: true
      image_input: false
    parameters:
      temperature: 0.7
      max_tokens: 20000
