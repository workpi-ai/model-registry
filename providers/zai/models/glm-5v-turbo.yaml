name: glm-5v-turbo

apis:
  chat_completion:
    api_format: openai
    endpoint: /chat/completions
    context:
      max_input: 200000
      max_output: 131072
    features:
      tool_use: true
      thinking: true
      image_input: true
    parameters:
      temperature: 0.7
      max_tokens: 20000
